image: gradle:8.5-jdk21

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/wrapper
    - .gradle/caches

stages:
  - build
  - test
  - publish

before_script:
  - export GRADLE_USER_HOME=`pwd`/.gradle
  - chmod +x ./gradlew
  - |
    if [ -n "$CI_COMMIT_TAG" ]; then
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      export RELEASE_VERSION="$TAG_VERSION"
      echo "Using release version $RELEASE_VERSION derived from tag $CI_COMMIT_TAG"
    fi

build:
  stage: build
  tags:
    - hq-linux-docker
  only:
    - tags
    - main # Remove this line if you want tags ONLY
  script:
    - ./gradlew clean build -x test
  artifacts:
    paths:
      - build/libs/
    expire_in: 1 week

test:
  stage: test
  tags:
    - hq-linux-docker
  only:
    - tags
    - main # Remove this line if you want tags ONLY
  script:
    - ./gradlew test
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/TEST-*.xml
    paths:
      - build/reports/tests/
    expire_in: 1 week

test:branches:
  stage: test
  tags:
    - hq-linux-docker
  rules:
    - if: "$CI_COMMIT_TAG"
      when: never
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"'
      when: on_success
  script:
    - ./gradlew test
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/TEST-*.xml
    paths:
      - build/reports/tests/
    expire_in: 1 week

# Publish to Maven Central (only on tags)
publish:maven-central:
  stage: publish
  tags:
    - hq-linux-docker
  only:
    - tags
  dependencies:
    - build
    - test
  script:
    # Install required tools
    - apt-get update && apt-get install -y gnupg zip curl

    # Import GPG key for signing
    - echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import

    # Ensure release version (derived from tag) is available
    - |
      if [ -z "$RELEASE_VERSION" ]; then
        echo "RELEASE_VERSION is not set. Ensure this job runs from a version tag (e.g., v1.0.1)." >&2
        exit 1
      fi
      export VERSION="$RELEASE_VERSION"

    # Build and sign artifacts
    - RELEASE_VERSION="$VERSION" ./gradlew publishToMavenLocal
      -Psigning.gnupg.keyName="$GPG_KEY_ID"
      -Psigning.gnupg.passphrase="$GPG_PASSPHRASE"

    # Create bundle directory structure
    - mkdir -p /tmp/bundle/com/molo17/parquetkt/$VERSION

    # Copy artifacts to bundle
    - cp ~/.m2/repository/com/molo17/parquetkt/$VERSION/parquetkt-$VERSION*.jar /tmp/bundle/com/molo17/parquetkt/$VERSION/
    - cp ~/.m2/repository/com/molo17/parquetkt/$VERSION/parquetkt-$VERSION*.jar.asc /tmp/bundle/com/molo17/parquetkt/$VERSION/
    - cp ~/.m2/repository/com/molo17/parquetkt/$VERSION/parquetkt-$VERSION.pom* /tmp/bundle/com/molo17/parquetkt/$VERSION/

    # Generate checksums
    - cd /tmp/bundle/com/molo17/parquetkt/$VERSION
    - for file in parquetkt-$VERSION*.jar parquetkt-$VERSION.pom; do md5sum "$file" | awk '{print $1}' > "${file}.md5"; sha1sum "$file" | awk '{print $1}' > "${file}.sha1"; done

    # Create bundle ZIP
    - cd /tmp/bundle && zip -r /tmp/parquetkt-bundle.zip com/

    # Generate auth token
    - export AUTH_TOKEN=$(printf "${SONATYPE_USERNAME}:${SONATYPE_PASSWORD}" | base64)

    # Upload to Central Portal with automatic publishing
    - |
      curl --fail --request POST \
        --header "Authorization: Bearer ${AUTH_TOKEN}" \
        --form bundle=@/tmp/parquetkt-bundle.zip \
        --form publishingType=AUTOMATIC \
        https://central.sonatype.com/api/v1/publisher/upload
  artifacts:
    paths:
      - build/libs/*.jar
      - build/publications/
    expire_in: 1 month
  environment:
    name: maven-central
    url: https://central.sonatype.com/artifact/com.molo17/parquetkt
