deploy_gluesync_linux:
  stage: deploy
  retry: 2
  tags:
    - hq-linux-docker
  image: docker:27.3.1
  services:
    - name: docker:dind
      variables:
        DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$PIPELINE_TYPE == "build_and_deploy"'
  script:
    - export GRADLE_USER_HOME=`pwd`/.gradle
    - sh scripts/docker-build-fat-core-hub.sh --module-version=$MODULE_VERSION --release-type=$RELEASE_TYPE --supported-deploy-arch=DEPLOY_AMD64_ARM64
  dependencies:
    - build_gluesync
  interruptible: true

